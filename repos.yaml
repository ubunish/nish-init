# vcstool manifest — workflow repos for the operational environment, cloned into ~/ubunish.
# Imported with: vcs import ~/ubunish < repos.yaml
# SSH urls require the ssh-key step (in nish-setup) to have run and the key to be on GitHub.
# fm-ros2 is NOT here: it lives in ~/fm_ros2 and bootstrap.sh clones it on its own.
repositories:
  nish-setup:
    type: git
    url: git@github.com:ubunish/nish-setup.git
    version: main
  nish-ai:
    type: git
    url: git@github.com:ubunish/nish-ai.git
    version: main
  nish-tui:
    type: git
    url: git@github.com:ubunish/nish-tui.git
    version: main
  nish-aliases:
    type: git
    url: git@github.com:ubunish/nish-aliases.git
    version: main
